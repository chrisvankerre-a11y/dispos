<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Récapitulatif des disponibilités</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:1200px;margin:0 auto;padding:20px;background:#f5f5f5}
    .container{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
    h1{color:#2c3e50;text-align:center}
    table{border-collapse:collapse;width:100%;min-width:800px;margin-top:20px}
    th,td{border:1px solid #ddd;padding:10px;text-align:center}
    th{background:#34495e;color:#fff}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
    a.btn{background:#6c757d;color:#fff;text-decoration:none;padding:8px 12px;border-radius:6px}
    .footer-btn{margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .reset-btn{background:#bdc3c7;color:#2c3e50;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:14px;}
    .reset-btn:hover{background:#95a5a6;}
    .meta-line{color:#2c3e50;margin:6px 0;}
    .admin-login{display:flex;gap:8px;align-items:center}
    .admin-login input{padding:8px;border:1px solid #ccc;border-radius:6px}
    .admin-login .btn{background:#6c757d;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
    .admin-login .btn:hover{opacity:.9}
    .admin-status{color:#2c3e50}
    .session-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px;border:1px dashed #bbb;border-radius:8px;background:#fff;margin-bottom:12px}
    .text-input{padding:10px;font-size:16px;border:2px solid #ddd;border-radius:6px}
    .pill{background:#eef;color:#223;padding:6px 10px;border-radius:999px;font-weight:600}
    .muted{color:#666}
    .btn-ghost{background:transparent;border:1px solid #ccc;color:#333;padding:8px 12px;border-radius:6px;cursor:pointer}
    .btn-ghost:hover{background:#f2f2f2}
    .slot-note{color:#ffd966; font-style:italic; font-weight:600;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0/dist/umd/supabase.js"></script>
  <script>
    /**
     * Modèle de données côté récap :
     *
     * RecapApp.state = {
     *   surveySlug: string,
     *   surveyId: string | null,
     *   startDateStr: string | null, // "YYYY-MM-DD"
     *   endDateStr: string | null,
     *   timeSlots: Array<{ start:string, end:string, label:string }>,
     *   adminHash: string | null,
     *   isAdmin: boolean,
     *   adminPanelRevealed: boolean,
     *   responses: Array<{ user_name:string, responses: Record<string,"available"|"unavailable"|"maybe"> }>
     * }
     */

    const SUPABASE_URL = "https://igicmnaxgjzyhujyosse.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnaWNtbmF4Z2p6eWh1anlvc3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE0MjU3OTksImV4cCI6MjA3NzAwMTc5OX0.e2bJclwq4Bn7MrPGJRlDU5pmaJWrgFFBfbWLWEccn_Y";
    if (!window.supabase || !window.supabase.createClient) { throw new Error("Supabase SDK non chargé (script CDN)."); }
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}
    });

    const RecapApp = {
      state: {
        surveySlug: new URLSearchParams(location.search).get("survey") || "",
        surveyId: null,
        startDateStr: null,
        endDateStr: null,
        timeSlots: [],
        adminHash: null,
        isAdmin: false,
        adminPanelRevealed: false,
        responses: []
      },

      // ---------- UTILS ----------
      ymdLocal(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), da=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${da}`; },
      parseISO(s){ return new Date(`${s}T00:00:00`); },
      rangeDates(start, end){ const out=[]; for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)) out.push(new Date(d)); return out; },
      fmt(d){ const dd=d.getDate(), mm=d.getMonth()+1, yyyy=d.getFullYear(); return `${dd}/${mm}/${yyyy}` },
      slotKey(dateIso, s){ return `${dateIso}|${s.start}-${s.end}`; },
      async sha256Hex(str){ const enc=new TextEncoder().encode(str); const buf=await crypto.subtle.digest("SHA-256", enc); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join(""); },
      headerText(s){ return (s.start&&s.end)?`${s.start}–${s.end}${s.label? " — "+s.label : ""}`:"Journée"; },

      // ---------- CHARGEMENT DU SONDAGE ----------
      async getSurvey() {
        const { surveySlug } = this.state;
        const { data, error } = await supabaseClient.from("surveys")
          .select("id, start_date, end_date, time_slots, slug, title, admin_password_hash")
          .eq("slug", surveySlug)
          .single();
        if (error) throw error;

        this.state.surveyId = data.id;
        this.state.startDateStr = data.start_date;
        this.state.endDateStr = data.end_date;
        this.state.timeSlots = Array.isArray(data.time_slots)
          ? data.time_slots.map(s => ({ start: s.start, end: s.end, label: (s.label || "").trim() }))
          : [];
        this.state.adminHash = data.admin_password_hash || null;

        const slotTxt = (this.state.timeSlots && this.state.timeSlots.length)
          ? this.state.timeSlots
              .map(s => `${s.start}–${s.end}${s.label ? " — " + s.label : ""}`)
              .join(" | ")
          : "Journée entière";

        document.getElementById("meta").textContent =
          `Sondage : ${data.slug} — Période ${data.start_date} → ${data.end_date} — Créneaux : ${slotTxt}`;

        document.getElementById("sessionShow").textContent = this.state.surveySlug;
        document.getElementById("backLink").href = `./?survey=${encodeURIComponent(this.state.surveySlug)}`;

        document.getElementById("adminStatus").textContent = this.state.adminHash
          ? "Entrez le mot de passe admin."
          : "Aucun mot de passe défini. Cliquez « Activer Admin ».";

        this.reflectAdminUI();
      },

      // ---------- ADMIN UI ----------
      revealAdminPanel(){
        this.state.adminPanelRevealed = true;
        const openBtn = document.getElementById("openAdminBtn");
        const loginWrap = document.getElementById("adminLoginWrap");
        if (openBtn) openBtn.style.display = "none";
        if (loginWrap) {
          loginWrap.style.display = "flex";
          const pwd = document.getElementById("adminPwd");
          if (pwd) pwd.focus();
        }
        this.reflectAdminUI();
      },

      async tryAdminLogin(){
        if (!this.state.adminHash) {
          this.state.isAdmin = false;
          document.getElementById("adminStatus").textContent =
            "Aucun mot de passe défini. Définissez-le depuis le formulaire.";
          this.reflectAdminUI();
          return;
        }
        const pwd = document.getElementById("adminPwd").value || "";
        const h = await this.sha256Hex(pwd);
        this.state.isAdmin = (h === this.state.adminHash);
        document.getElementById("adminStatus").textContent =
          this.state.isAdmin ? "Admin activé ✅" : "Mot de passe incorrect.";
        this.reflectAdminUI();
      },

      reflectAdminUI(){
        const showReset = this.state.adminPanelRevealed && this.state.isAdmin;
        const resetWrap = document.getElementById("resetWrap");
        const loginWrap = document.getElementById("adminLoginWrap");
        if (resetWrap) resetWrap.style.display = showReset ? "block" : "none";
        if (loginWrap) loginWrap.style.display = this.state.adminPanelRevealed ? "flex" : "none";
      },

      // ---------- RÉPONSES ----------
      async getAllResponses(){
        const { surveyId } = this.state;
        const { data, error } = await supabase
          .from("submissions_simple")
          .select("user_name, responses")
          .eq("survey_id", surveyId);
        if (error) throw error;
        this.state.responses = data || [];
      },

      buildTable(){
        const theadRow = document.getElementById("theadRow");
        const tbody = document.getElementById("tbody");
        theadRow.innerHTML = "";
        tbody.innerHTML = "";

        theadRow.innerHTML = "<th>Date / Créneau</th>";
        const participants = this.state.responses.map(r => r.user_name);
        participants.forEach(name => { theadRow.innerHTML += `<th>${name}</th>`; });
        theadRow.innerHTML += "<th>Créneau parfait</th>";

        const start = this.parseISO(this.state.startDateStr);
        const end = this.parseISO(this.state.endDateStr);
        const dates = this.rangeDates(start, end);
        const slots = (this.state.timeSlots && this.state.timeSlots.length)
          ? this.state.timeSlots
          : [{ start: "", end: "", label: "" }];

        dates.forEach(d => {
          const dIso = this.ymdLocal(d);
          slots.forEach(s => {
            const row = document.createElement("tr");
            const key = this.slotKey(dIso, s);
            let cells = `<td>${this.fmt(d)}${s.start ? ` — ${s.start}–${s.end}${s.label ? " — <span class='slot-note'>" + s.label + "</span>" : ""}` : ""}</td>`;
            let allAvailable = true;

            this.state.responses.forEach(r => {
              const val = r.responses?.[key];
              let symbol = "";
              if (val === "available") symbol = "✅";
              else if (val === "maybe") { symbol = "❓"; allAvailable = false; }
              else { symbol = "❌"; allAvailable = false; }
              cells += `<td>${symbol}</td>`;
            });

            cells += `<td>${(this.state.responses.length > 0 && allAvailable) ? "🌟" : ""}</td>`;
            row.innerHTML = cells;
            tbody.appendChild(row);
          });
        });
      },

      async resetAll(){
        if (!this.state.isAdmin) {
          alert("Mode administrateur requis.");
          return;
        }
        if (!confirm("⚠️ Effacer toutes les réponses de cette session ?")) return;

        const { surveyId } = this.state;
        const { error } = await supabase
          .from("submissions_simple")
          .delete()
          .eq("survey_id", surveyId);
        if (error) {
          alert("Erreur : " + error.message);
          return;
        }
        alert("🧹 Toutes les réponses ont été effacées.");
        await this.init();
      },

      // ---------- INIT ----------
      async init(){
        if (!this.state.surveySlug) return;
        await this.getSurvey();
        await this.getAllResponses();
        this.buildTable();
      }
    };

    // Wrappers globaux pour le HTML
    function revealAdminPanel(){ RecapApp.revealAdminPanel(); }
    function tryAdminLogin(){ RecapApp.tryAdminLogin(); }
    function resetAll(){ RecapApp.resetAll(); }

    document.addEventListener("DOMContentLoaded", () => RecapApp.init());
  </script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>🧮 Récapitulatif des disponibilités</h1>
      <a id="backLink" class="btn" href="./">↩️ Retour au formulaire</a>
    </div>

    <div class="meta-line">Session active : <span id="sessionShow" class="pill"></span></div>
    <div id="meta" class="meta-line"></div>

    <table id="tbl">
      <thead><tr id="theadRow"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="footer-btn">
      <button id="openAdminBtn" class="btn-ghost" onclick="revealAdminPanel()">🔐 Mode admin</button>
      <div id="adminLoginWrap" class="admin-login" style="display:none;">
        <input id="adminPwd" type="password" placeholder="Mot de passe admin" />
        <button class="btn" onclick="tryAdminLogin()">Activer Admin</button>
        <span id="adminStatus" class="admin-status"></span>
      </div>
      <div id="resetWrap" style="display:none;">
        <button class="reset-btn" onclick="resetAll()">🧹 Réinitialiser le tableau</button>
      </div>
    </div>
  </div>
</body>
</html>
